name: Check
on: push
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install dependencies
              run: npm ci
            - name: Lint
              run: npm run lint
    test:
        # depends on lint action
        needs: [lint]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install dependencies
              run: npm ci
            - name: Test
              run: npm run test